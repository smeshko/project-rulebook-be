version: '3.9'

# Named volumes for data persistence
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

# Network for service isolation
networks:
  dev_network:
    driver: bridge

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15.4-alpine
    container_name: project_rulebook_postgres_dev
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${DATABASE_USERNAME:-vapor}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-project_rulebook_dev}
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev_network
    # Health check to ensure PostgreSQL is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-vapor} -d ${DATABASE_NAME:-project_rulebook_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis Cache Service
  redis:
    image: redis:7.2-alpine
    container_name: project_rulebook_redis_dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dev_network
    # Start Redis with custom configuration
    command: redis-server /usr/local/etc/redis/redis.conf
    # Health check to ensure Redis is responding
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M