paths:
  backend: app/server
  frontend: app/client
  scripts: scripts
  specs: specs
  docs: app_docs
  
ports:
  backend_start: 9100
  frontend_start: 9200

infrastructure:
  input: linear
  trigger: webhook
  environment: local
  review: github_pr

# Evidence gathering configuration
# Configures HOW evidence is gathered (platform, server settings)
# To enable/disable evidence in the loop, use validation.evidence.enabled
evidence:
  platform: backend
  # server_command: "npm run dev"    # Optional: auto-detected
  # base_url: http://localhost:3000  # Optional: default

# Validation loop configuration
# Controls how the validate-and-fix loop behaves
validation:
  # Maximum iterations before giving up (1-10)
  max_iterations: 3

  # Max fix attempts per issue before deferring (1-5)
  max_fix_attempts_per_issue: 2

  # Validators (all enabled by default)
  tests:
    enabled: true
    command: /bmad:adw:workflows:run-tests   # Optional: override default /adw/test

  review:
    enabled: true
    command: /bmad:adw:workflows:code-review # Optional: override default /adw/review

  evidence:
    enabled: true
    command: /bmad:adw:workflows:gather-evidence   # Optional: override SDK skill

  # Fixer (uses AI by default)
  fixer_command: /bmad:adw:workflows:fix  # Optional: override AI fixer

workflow:
  # Global workflow settings
  default_model_set: base
  webhook_port: 8001
  max_concurrent_worktrees: 15

  # # SDLC Phase Configuration
  phases:
    # Planning phase: Classify issue and create implementation plan
    - name: plan
      enabled: true
      command: /bmad:adw:workflows:create-story
      # model: sonnet  # Optional: override model for this phase

    # Build phase: Implement the solution
    - name: build
      enabled: true
      command: /bmad:adw:workflows:dev-story
      # model: opus  # Optional: use Opus for complex implementations

    # VALIDATE replaces test + review
    # Runs all validators, triages issues, fixes, and loops until confident
    - name: validate
      enabled: true
      on_failure: block

    # Document phase: Update documentation
    - name: document
      enabled: true
      command: /bmad:adw:workflows:document-feature
      skip_if: "issue.labels contains 'bug'"

    # Ship phase: Create PR and prepare for merge
    - name: ship
      enabled: false
      command: /bmad:adw:workflows:ship
