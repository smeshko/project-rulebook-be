# ADW Project Configuration
# Generated by ADW Init Wizard on 2026-01-21
#
# Settings shown as comments are optional with default values.
# Uncomment and modify to customize behavior.

# === Core Settings ===
name: swift
language: swift
platform: api
# framework: null  # Framework being used (e.g., fastapi)

# === Commands ===
commands:
  test: swift test
  build: swift build

# === Git Integration ===
git:
  enabled: true
  branch_prefix: feature/
  auto_create_pr: true
  # auto_commit: true  # Auto-commit after phases
  # skip_hooks: false  # Skip pre-commit hooks
  # base_branch: null  # PR base branch (defaults to main)

# === Task Manager ===
task_manager:
  type: linear
  team_key: RULE
  sync_comments: true
  # auto_close: false  # Close task when PR merged

# === Worktree & Ports ===
# worktree:
#   enabled: true  # Use worktree isolation
#   base_dir: "trees"  # Directory for worktrees
#   max_concurrent: 15  # Maximum concurrent runs
#   port_range:
#     backend_start: 9100  # Backend port base
#     frontend_start: 9200  # Frontend port base

# === LLM Configuration ===
# llm:
#   path: "claude"  # Path to Claude Code executable
#   timeout_seconds: 300  # Max execution time
#   max_retries: 3  # Retry attempts on failure
#   model: null  # Model override

# === Security ===
security:
  allow_dangerous: true  # Log warnings instead of blocking

