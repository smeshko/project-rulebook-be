# Redis Configuration for Development Environment
# Optimized for local development with reasonable defaults

# Basic Configuration
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory Management (Development Settings)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence Settings
# Save snapshots for development but prioritize performance
save 900 1
save 300 10
save 60 10000

# Disable AOF for faster development (data can be recreated)
appendonly no

# Security (Basic for development)
protected-mode no

# Logging
loglevel notice
logfile ""

# Performance Tuning for Development
tcp-backlog 511
databases 16
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Client Settings
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Memory Usage Reporting
latency-monitor-threshold 100

# Disable some features not needed in development
replica-read-only yes
repl-diskless-sync no